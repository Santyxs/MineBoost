###############################################
#              MINEBOOST SUPPORT               #
#---------------------------------------------#
# Discord:  https://discord.gg/E2hAAa7F6q     #
###############################################

version: 1

# ━━━━━━━━━━━━━━━━━━━━━━━━ #
#       CORE SETTINGS      #
# ━━━━━━━━━━━━━━━━━━━━━━━━ #

# Prefix for the custom messages
prefix: "&8[&6MineBoost&8] &r"

# Language for messages (en, es, pt)
language: en

# Enable or disable update checking
check-updates: true

# ━━━━━━━━━━━━━━━━━━━━━━━━ #
#       TOOLS SETTINGS     #
# ━━━━━━━━━━━━━━━━━━━━━━━━ #

# Area size per tier. Must be odd (3, 5, 7...); even values are rounded automatically.
area-sizes:
  WOOD: 3
  STONE: 3
  IRON: 5
  GOLD: 5
  DIAMOND: 7
  NETHERITE: 9

# Hard cap for area-sizes above. Absolute limit is 31, enforced in code regardless of this value.
max-area-size: 31

# Cooldown (seconds) between bonus uses per tier.
cooldowns:
  WOOD: 0
  STONE: 1
  IRON: 3
  GOLD: 5
  DIAMOND: 7
  NETHERITE: 10

# ━━━━━━━━━━━━━━━━━━━━━━━━ #
#      WORLDS SETTINGS     #
# ━━━━━━━━━━━━━━━━━━━━━━━━ #

# Worlds where the tool is disabled.
disabled-worlds:
  - world_the_end